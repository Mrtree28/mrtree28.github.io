<!DOCTYPE html>
<html>
<head>
    <title>Submit Report - STAR CORP</title>
    <style>
        body {
            background-color: #000;
            color: #e0e0e0;
            font-family: Courier New, monospace;
            margin: 40px;
        }

        h1 {
            border-bottom: 2px solid white;
            padding-bottom: 10px;
        }

        a {
            color: #aaa;
            text-decoration: none;
        }

        a:hover {
            color: white;
        }

        .box {
            border: 1px solid white;
            padding: 20px;
            margin-top: 20px;
            max-width: 700px;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            margin-top: 5px;
            padding: 8px;
            background-color: #111;
            color: white;
            border: 1px solid white;
            font-family: Courier New, monospace;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: black;
            color: white;
            border: 1px solid white;
            cursor: pointer;
        }

        button:hover {
            background-color: #111;
        }

        .warning {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<a href="index.html">← Back to Database</a>

<h1>STAR CORP SUBMISSION TERMINAL</h1>

<div class="box">

<p>Submit a new entity, site, or report for internal review.</p>

<form id="form">

    <label>Type:</label>
    <select id="type">
        <option>Entity</option>
        <option>Site</option>
        <option>Technology</option>
        <option>Story</option>
    </select>

    <label>Designation:</label>
    <input type="text" id="designation" placeholder="e.g. C-3 or Site Delta">

    <label>Title:</label>
    <input type="text" id="title" placeholder="Name of entry">

    <label>Description:</label>
    <textarea rows="6" id="description" placeholder="Enter full report..."></textarea>

    <label>Threat Level:</label>
    <select id="threat">
        <option>Low</option>
        <option>Moderate</option>
        <option>High</option>
        <option>Extreme</option>
    </select>

    <button type="submit">SUBMIT REPORT</button>

</form>

<p class="warning">
⚠ Submissions will be sent to the STAR CORP review system.
</p>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let type = document.getElementById("type").value;
    let designation = document.getElementById("designation").value;
    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;
    let threat = document.getElementById("threat").value;

    let issueTitle = encodeURIComponent(`[${type}] ${designation} - ${title}`);

    let issueBody = encodeURIComponent(
`---  
Type: ${type}  

Designation: ${designation}  

Title: ${title}  

Threat Level: ${threat}  

Description:
${description}

---  
Submitted via STAR CORP Database`
    );

    let url = `https://github.com/Mrtree28/mrtree28.github.io/issues/new?title=${issueTitle}&body=${issueBody}`;

    window.open(url, "_blank");
});
</script>

</body>
</html>
